{# templates/partials/paginacion.html #}
{% if page_obj.has_other_pages %}
<nav>
    <ul class="pagination justify-content-center mb-0">

        {% if page_obj.has_previous %}
            <li class="page-item">
                <a class="page-link" href="?page={{ page_obj.previous_page_number }}&q={{ q }}&estado={{ estado_activo }}">
                    &laquo; Anterior
                </a>
            </li>
        {% endif %}

        {% for num in page_obj.paginator.page_range %}
            <li class="page-item {% if page_obj.number == num %}active{% endif %}">
                <a class="page-link" href="?page={{ num }}&q={{ q }}&estado={{ estado_activo }}">
                    {{ num }}
                </a>
            </li>
        {% endfor %}

        {% if page_obj.has_next %}
            <li class="page-item">
                <a class="page-link" href="?page={{ page_obj.next_page_number }}&q={{ q }}&estado={{ estado_activo }}">
                    Siguiente &raquo;
                </a>
            </li>
        {% endif %}

    </ul>
</nav>
{% endif %}
